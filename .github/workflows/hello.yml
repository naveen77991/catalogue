name: Build and Push to ECR

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configure AWS credentials
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      # 3. Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build Docker image
      - name: Build Image
        run: |
          docker build -t catalogue:latest .

      # 5. Tag image
      - name: Tag Image
        run: |
          docker tag catalogue:latest 439481669447.dkr.ecr.us-east-1.amazonaws.com/catalogue:latest

      # 6. Push image
      - name: Push to ECR
        run: |
          docker push 439481669447.dkr.ecr.us-east-1.amazonaws.com/catalogue:latest
