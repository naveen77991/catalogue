name: Push to ECR

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image
        run: docker build -t catalogue:latest .

      - name: Tag Image
        run: docker tag catalogue:latest 439481669447.dkr.ecr.us-east-1.amazonaws.com/catalogue:latest

      - name: Push Image
        run: docker push 439481669447.dkr.ecr.us-east-1.amazonaws.com/catalogue:latest
