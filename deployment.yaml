apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  labels:
    app: catalogue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalogue
  template:
    metadata:
      labels:
        app: catalogue
    spec:
      containers:
      - name: catalogue
        image: 439481669447.dkr.ecr.us-west-1.amazonaws.com/catalogue:IMAGE_VERSION
        ports:
        - containerPort: 8080
